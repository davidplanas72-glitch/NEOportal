<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>NEO PORTAL | Contacto</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-tint": "#8ff5ff",
                        "secondary-container": "#6f00be",
                        "tertiary": "#7de9ff",
                        "surface-dim": "#060e20",
                        "primary": "#8ff5ff",
                        "background": "#060e20",
                        "on-surface": "#dee5ff",
                        "outline-variant": "#40485d",
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk"],
                        "body": ["Manrope"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            overflow: hidden;
            background-color: #060e20;
            height: 100vh;
        }
        .star-field {
            background-image: radial-gradient(circle at 2px 2px, rgba(255, 255, 255, 0.1) 1px, transparent 0);
            background-size: 40px 40px;
        }
        .technical-grid {
            background-image: linear-gradient(to right, rgba(65, 71, 84, 0.2) 1px, transparent 1px), 
                              linear-gradient(to bottom, rgba(65, 71, 84, 0.2) 1px, transparent 1px);
            background-size: 4rem 4rem;
        }
    </style>
</head>
<body class="font-body text-on-surface bg-background flex flex-col relative star-field">

<header class="fixed top-0 w-full flex justify-between items-center px-8 py-4 z-50 bg-slate-950/60 backdrop-blur-xl border-b border-white/5">
    <div class="text-2xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-white via-white to-primary font-headline">
        NEO PORTAL
    </div>
    <nav class="hidden md:flex items-center gap-8">
        <a class="text-slate-400 hover:text-cyan-200 transition-colors font-headline tracking-tight" href="index.html">PORTAL</a>
        <a class="text-slate-400 hover:text-cyan-200 transition-colors font-headline tracking-tight" href="vpn.html">Leonardo VPN</a>
        <a class="text-slate-400 hover:text-cyan-200 transition-colors font-headline tracking-tight" href="aplicaciones.html">APLICACIONES</a>
        <a class="text-cyan-400 font-bold border-b-2 border-cyan-400 pb-1 font-headline tracking-tight" href="contacto.html">CONTACTO</a>
    </nav>
    <div class="flex items-center gap-4">
        <div class="relative group">
            <select class="bg-surface-container-highest/60 text-on-surface border border-white/10 rounded-full px-4 py-2 font-bold text-xs tracking-widest uppercase cursor-pointer appearance-none hover:border-primary/50 transition-all focus:outline-none focus:ring-1 focus:ring-primary/50 backdrop-blur-xl pr-8">
                <option value="es">ES</option>
                <option value="en">EN</option>
                <option value="fr">FR</option>
                <option value="de">DE</option>
            </select>
            <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-xs pointer-events-none text-slate-400">expand_more</span>
        </div>
    </div>
</header>

<main class="flex-1 flex flex-col items-center justify-center relative">
    <div class="absolute inset-0 z-0 opacity-10 technical-grid pointer-events-none"></div>
    <div class="z-10 text-center space-y-8">
        <div class="w-24 h-24 bg-primary/10 rounded-3xl flex items-center justify-center text-primary mx-auto mb-8 border border-primary/20">
            <span class="material-symbols-outlined text-5xl">alternate_email</span>
        </div>
        <h1 class="text-5xl md:text-7xl font-extrabold font-headline tracking-tighter uppercase">CONTACTO</h1>
        <p class="text-xl text-slate-400 font-headline tracking-[0.3em] uppercase">SISTEMA EN DESARROLLO</p>
        <div class="h-1 w-48 bg-primary/20 mx-auto rounded-full overflow-hidden">
            <div class="h-full bg-primary w-1/3 animate-[loading_2s_infinite_linear]"></div>
        </div>
    </div>
</main>

<style>
    @keyframes loading {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(300%); }
    }
</style>

<footer class="w-full px-12 py-8 bg-transparent text-center">
    <div class="font-label text-[10px] uppercase tracking-[0.3em] text-slate-500">
        © 2024 NEO PORTAL. SECURED BY KINETIC VAULT.
    </div>
</footer>

</body>
</html>
